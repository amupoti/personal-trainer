name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: printenv RELEASE_KEYSTORE_BASE64 | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Set release version
        run: |
          version_name="${GITHUB_REF_NAME#v}"
          if [[ ! "$version_name" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Tag must use the format vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          version_code=$((
            10#${BASH_REMATCH[1]} * 1000000 +
            10#${BASH_REMATCH[2]} * 1000 +
            10#${BASH_REMATCH[3]}
          ))
          echo "RELEASE_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_CODE=$version_code" >> "$GITHUB_ENV"

      - name: Test and build signed APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew test assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.jks" \
            -Pandroid.injected.signing.store.password="$RELEASE_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$RELEASE_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$RELEASE_KEY_PASSWORD"

      - name: Verify and name APK
        run: |
          apksigner_path=$(find "$ANDROID_HOME/build-tools" -name apksigner -type f |
            sort -V | tail -n 1)
          "$apksigner_path" verify \
            app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk \
            "daily-movement-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "daily-movement-${GITHUB_REF_NAME}.apk" \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
